name: Daily testing build
run-name: Testing build of Kaiden from Main branch

# Fork-friendly variant of openkaiden/kaiden#2221.
# Upstream: set PRERELEASE_OWNER to openkaiden and keep fork guards enabled.
# Fork test: requires serbangeorge-m/testing-prereleases + KAIDEN_BOT_TOKEN secret.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or SHA to build'
        required: false
        default: 'main'
      windows_only:
        description: 'Build Windows x64 only (faster). Set false to validate full matrix arch fix.'
        type: boolean
        default: true
  schedule:
    - cron: '0 1 * * *'

concurrency:
  group: daily-testing-build
  cancel-in-progress: true

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  DEBUG: electron-builder
  PRERELEASE_OWNER: ${{ github.event.repository.fork && 'serbangeorge-m' || 'openkaiden' }}
  PRERELEASE_REPO: testing-prereleases

permissions:
  contents: read

jobs:
  tag:
    name: Tagging
    runs-on: ubuntu-24.04
    if: github.event.repository.fork == false || github.event_name == 'workflow_dispatch'
    outputs:
      githubTag: ${{ steps.TAG_UTIL.outputs.githubTag }}
      kaidenVersion: ${{ steps.TAG_UTIL.outputs.kaidenVersion }}
      releaseId: ${{ steps.create_release.outputs.id }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}
          token: ${{ secrets.KAIDEN_BOT_TOKEN }}
          persist-credentials: false
          fetch-depth: 0

      - name: Generate tag utilities
        id: TAG_UTIL
        run: |
          CURRENT_DAY=$(date +'%Y%m%d')
          SHORT_SHA1=$(git rev-parse --short HEAD)
          KAIDEN_VERSION=$(jq -r '.version' package.json)
          STRIPPED_VERSION=${KAIDEN_VERSION%-next}
          TAG_PATTERN=${STRIPPED_VERSION}-$(date +'%Y%m%d%H%M')-${SHORT_SHA1}
          echo "githubTag=v$TAG_PATTERN" >> ${GITHUB_OUTPUT}
          echo "kaidenVersion=$TAG_PATTERN" >> ${GITHUB_OUTPUT}

          GITHUB_TAG="v$TAG_PATTERN"
          echo "Checking if tag exists: $(git rev-parse -q --verify "$GITHUB_TAG")"
          if git rev-parse -q --verify "$GITHUB_TAG" > /dev/null 2>&1; then
            echo "Tag '$GITHUB_TAG' exists, skipping..."
            exit 1;
          else
            echo "Tag '$GITHUB_TAG' does not exist yet, continue"
          fi

      - name: Create a Tag, commit and push to testing-prereleases
        env:
          GIT_USER_NAME: ${{ github.actor }}
          GIT_USER_EMAIL: "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          KAIDEN_BOT_TOKEN: ${{ secrets.KAIDEN_BOT_TOKEN }}
          PRERELEASE_OWNER: ${{ env.PRERELEASE_OWNER }}
          PRERELEASE_REPO: ${{ env.PRERELEASE_REPO }}
        run: |
          echo "Setting github.actor: $GIT_USER_NAME"
          git config --local user.name "$GIT_USER_NAME"
          git config --local user.email "$GIT_USER_EMAIL"
          sed -i "s#version\":\ \"\(.*\)\",#version\":\ \"${{ steps.TAG_UTIL.outputs.kaidenVersion }}\",#g" package.json
          find extensions/* -maxdepth 2 -name "package.json" | xargs -I {} sed -i "s#version\":\ \"\(.*\)\",#version\":\ \"${{ steps.TAG_UTIL.outputs.kaidenVersion }}\",#g" {}

          sed -i "s#\"repository\":\ \"\(.*\)\",#\"repository\":\ \"https://github.com/${PRERELEASE_OWNER}/${PRERELEASE_REPO}\",#g" package.json

          cat package.json
          git add package.json extensions/*/package.json

          rm -rf .github/workflows/*
          git add .github/

          git commit -m "chore: tag ${{ steps.TAG_UTIL.outputs.githubTag }}"
          echo "Tagging with ${{ steps.TAG_UTIL.outputs.githubTag }}"
          git tag ${{ steps.TAG_UTIL.outputs.githubTag }}

          git remote add prereleases "https://x-access-token:${KAIDEN_BOT_TOKEN}@github.com/${PRERELEASE_OWNER}/${PRERELEASE_REPO}.git"
          git push prereleases ${{ steps.TAG_UTIL.outputs.githubTag }}

      - name: Create Release
        id: create_release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          tag: ${{ steps.TAG_UTIL.outputs.githubTag }}
          name: ${{ steps.TAG_UTIL.outputs.githubTag }}
          draft: true
          prerelease: true
          owner: ${{ env.PRERELEASE_OWNER }}
          repo: ${{ env.PRERELEASE_REPO }}
          token: ${{ secrets.KAIDEN_BOT_TOKEN }}

  build:
    name: Build / ${{ matrix.os }}
    needs: tag
    runs-on: ${{ matrix.os }}
    if: github.event.repository.fork == false || github.event_name == 'workflow_dispatch'
    env:
      ELECTRON_ENABLE_INSPECT: true
      GITHUB_TOKEN: ${{ secrets.KAIDEN_BOT_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(github.event_name == 'workflow_dispatch' && github.event.inputs.windows_only == 'true' && '[{"os":"windows-2022","windows_arch":"x64"}]' || '[{"os":"windows-2022","windows_arch":"x64"},{"os":"windows-11-arm","windows_arch":"arm64"},{"os":"ubuntu-24.04","windows_arch":""},{"os":"macos-26","windows_arch":""}]') }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ${{ env.PRERELEASE_OWNER }}/${{ env.PRERELEASE_REPO }}
          ref: ${{ needs.tag.outputs.githubTag }}
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        name: Install pnpm
        with:
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'

      - name: Execute pnpm
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == windows-* ]] && [ "${{ github.event.repository.fork }}" = "true" ]; then
            # Fork Windows runners: reinstall electron binary (upstream uses cached pnpm install).
            rm -rf node_modules/electron
            pnpm install --force
            node ./node_modules/electron/install.js
            pnpm exec electron --version
          else
            pnpm install
          fi

      - name: Install Flatpak dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install flatpak -y
          sudo apt-get install flatpak-builder -y
          sudo apt-get install elfutils -y
          flatpak remote-add --if-not-exists flathub --user https://flathub.org/repo/flathub.flatpakrepo
          flatpak install flathub --no-static-deltas --user -y org.freedesktop.Platform//25.08 org.freedesktop.Sdk//25.08

      - name: Run Build and Compile on all platforms
        timeout-minutes: 60
        shell: bash
        run: |
          if [ "${{ matrix.windows_arch }}" = "x64" ]; then
            pnpm exec cross-env MODE=production pnpm run build
            # Target list is required: --x64 alone still builds both archs from config and
            # lets windows-11-arm clobber setup-x64.exe on the shared GitHub release.
            pnpm exec electron-builder build --publish always --config .electron-builder.config.cjs --win nsis:x64 portable:x64
          elif [ "${{ matrix.windows_arch }}" = "arm64" ]; then
            pnpm exec cross-env MODE=production pnpm run build
            pnpm exec electron-builder build --publish always --config .electron-builder.config.cjs --win nsis:arm64 portable:arm64
          else
            pnpm compile:next
          fi

      - name: Assert Windows release artifacts match runner arch
        if: matrix.windows_arch != ''
        shell: bash
        run: |
          shopt -s nullglob
          echo "dist contents:"
          ls -la dist/ || true

          if [ "${{ matrix.windows_arch }}" = "x64" ]; then
            forbidden=(dist/*-arm64.exe dist/*-setup-arm64.exe dist/*-setup.exe)
          else
            forbidden=(dist/*-x64.exe dist/*-setup-x64.exe dist/*-setup.exe)
          fi

          for pattern in "${forbidden[@]}"; do
            for file in $pattern; do
              echo "::error::${{ matrix.os }} must not publish ${file}"
              exit 1
            done
          done

          echo "Windows ${{ matrix.windows_arch }} artifacts look correct"

  release:
    needs: [tag, build]
    name: Release
    runs-on: ubuntu-24.04
    if: always() && (github.event.repository.fork == false || github.event_name == 'workflow_dispatch')
    steps:
      - name: id
        run: |
          echo the release id is ${{ needs.tag.outputs.releaseId }}
          echo "The result of the build jobs: ${{ needs.build.result }}"

      - name: Publish release
        if: ${{ needs.build.result == 'success' }}
        uses: StuYarrow/publish-release@01f2a1365bacd77bad861873a7fdf274ab49eefd # v1.1.2
        env:
          GITHUB_TOKEN: ${{ secrets.KAIDEN_BOT_TOKEN }}
        with:
          id: ${{ needs.tag.outputs.releaseId }}
          repo: ${{ env.PRERELEASE_REPO }}
          owner: ${{ env.PRERELEASE_OWNER }}

      - name: Delete release
        if: ${{ needs.build.result != 'success' && needs.tag.outputs.releaseId != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.KAIDEN_BOT_TOKEN }}
          PRERELEASE_OWNER: ${{ env.PRERELEASE_OWNER }}
          PRERELEASE_REPO: ${{ env.PRERELEASE_REPO }}
        run: |
          echo "Build failed, deleting release with id: ${{ needs.tag.outputs.releaseId }}"
          set -e
          curl -L -f -X DELETE -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${PRERELEASE_OWNER}/${PRERELEASE_REPO}/releases/${{ needs.tag.outputs.releaseId }}"
          echo "Release deleted..."
          echo "Delete tag: ${{ needs.tag.outputs.githubTag }}"
          curl -L -f -X DELETE -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${PRERELEASE_OWNER}/${PRERELEASE_REPO}/git/refs/tags/${{ needs.tag.outputs.githubTag }}"
          echo "Tag deleted..."
