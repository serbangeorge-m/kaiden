name: nightly e2e tests

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to run tests on'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - windows
          - macos
          - linux
      test_suite:
        description: 'E2E test suite to run'
        required: false
        default: 'test:e2e'
        type: choice
        options:
          - test:e2e
          - test:e2e:workspaces
      repo:
        description: 'Repository to checkout (e.g., owner/repo for forks)'
        required: false
        default: ''
        type: string
      ref:
        description: 'Branch, tag, or SHA to checkout'
        required: false
        default: ''
        type: string

jobs:
  windows-e2e-tests:
    if: ${{ github.event_name == 'schedule' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows' }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2025, windows-11-arm]
        mode: [prod, dev]
    uses: ./.github/workflows/e2e-test-job.yaml
    with:
      instance: ${{ matrix.os }}
      mode: ${{ (inputs.test_suite == 'test:e2e:workspaces') && 'prod' || matrix.mode }}
      compile_args: '--win dir'
      test_script: ${{ inputs.test_suite || 'test:e2e' }}
      repo: ${{ inputs.repo }}
      ref: ${{ inputs.ref }}
    secrets: inherit

  linux-e2e-tests:
    if: ${{ github.event_name == 'schedule' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        mode: [prod, dev]
        inference_provider: [ollama, ramalama]
        include:
          - inference_provider: ollama
            second_model: 'granite3.1-dense:2b'
    uses: ./.github/workflows/e2e-test-job.yaml
    with:
      instance: ${{ matrix.os }}
      mode: ${{ (inputs.test_suite == 'test:e2e:workspaces') && 'prod' || matrix.mode }}
      inference_provider: ${{ matrix.inference_provider }}
      inference_model: 'granite3.2:2b'
      inference_second_model: ${{ matrix.second_model }}
      compile_args: '--linux dir'
      test_script: ${{ inputs.test_suite || 'test:e2e' }}
      repo: ${{ inputs.repo }}
      ref: ${{ inputs.ref }}
    secrets: inherit

  macos-e2e-tests:
    if: ${{ github.event_name == 'schedule' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'macos' }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-26]
        mode: [prod, dev]
    uses: ./.github/workflows/e2e-test-job.yaml
    with:
      instance: ${{ matrix.os }}
      mode: ${{ (inputs.test_suite == 'test:e2e:workspaces') && 'prod' || matrix.mode }}
      compile_args: '--mac dir'
      test_script: ${{ inputs.test_suite || 'test:e2e' }}
      repo: ${{ inputs.repo }}
      ref: ${{ inputs.ref }}
    secrets: inherit
