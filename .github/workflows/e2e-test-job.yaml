name: E2E Test Job

on:
  workflow_call:
    inputs:
      instance:
        description: 'GitHub Actions runner instance (e.g., macos-latest, windows-2025, ubuntu-24.04)'
        required: true
        type: string
      mode:
        description: 'Test mode (prod or dev)'
        required: true
        type: string
      compile_args:
        description: 'Arguments for pnpm compile:current (e.g., --win dir, --linux dir, --mac dir)'
        required: true
        type: string
      repo:
        description: 'Repository to checkout (e.g., owner/repo for forks). Defaults to the current repository.'
        required: false
        type: string
        default: ''
      ref:
        description: 'Branch, tag, or SHA to checkout. Defaults to the default branch.'
        required: false
        type: string
        default: ''
      inference_provider:
        description: 'Local inference provider: "ollama", "ramalama", or "none" to skip.'
        required: false
        type: string
        default: 'none'
      inference_model:
        description: 'Model to pull and serve (e.g., granite3.2:2b, phi4-mini, qwen2.5:3b).'
        required: false
        type: string
        default: 'granite3.2:2b'
      inference_second_model:
        description: 'Optional second inference model to pull (Ollama only, e.g., granite3.1-dense:2b).'
        required: false
        type: string
        default: ''
      test_script:
        description: 'pnpm script to run for E2E tests.'
        required: false
        type: string
        default: 'test:e2e'

jobs:
  e2e-test:
    name: ${{ inputs.inference_provider != 'none' && format('{0} ({1})', inputs.instance, inputs.inference_provider) || inputs.instance }}
    runs-on: ${{ inputs.instance }}
    timeout-minutes: 60
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GEMINI_API_KEY: ${{ !startsWith(inputs.instance, 'ubuntu') && secrets.GEMINI_API_KEY || '' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PODMAN_ENABLED: ${{ startsWith(inputs.instance, 'ubuntu') && 'true' || '' }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          repository: ${{ inputs.repo || github.repository }}
          ref: ${{ inputs.ref || github.ref }}

      - name: Free disk space
        if: runner.os == 'Linux'
        uses: podman-desktop/e2e/.github/actions/disk-cleanup@fe42dc2bd7b4aa6047e5d1f44c44adfded29baca

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda
        name: Install pnpm
        with:
          run_install: false

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Execute pnpm
        run: pnpm install

      - name: Enable Podman socket
        if: runner.os == 'Linux'
        run: |
          systemctl --user enable --now podman.socket
          echo "XDG_RUNTIME_DIR=$XDG_RUNTIME_DIR" >> "$GITHUB_ENV"
          podman info

      - name: Setup Linux secret service
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gnome-keyring dbus-x11 libsecret-1-0 libsecret-tools
          mkdir -p "$HOME/.local/share/keyrings"

      - name: Setup kdn CLI
        if: runner.os == 'Linux'
        shell: bash
        run: |
          ARCH=$([[ "$(uname -m)" == "aarch64" || "$(uname -m)" == "arm64" ]] && echo "arm64" || echo "amd64")
          KDN_VERSION=$(curl -sS -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/openkaiden/kdn/releases/latest" | jq -r .tag_name | sed 's/^v//')
          ARCHIVE="kdn_${KDN_VERSION}_linux_${ARCH}.tar.gz"
          curl -sSL "https://github.com/openkaiden/kdn/releases/download/v${KDN_VERSION}/${ARCHIVE}" \
            | sudo tar xz -C /usr/local/bin kdn
          kdn version

      - name: Setup Ollama
        if: inputs.inference_provider == 'ollama'
        uses: ./.github/actions/setup-ollama
        with:
          model: ${{ inputs.inference_model }}
          second_model: ${{ inputs.inference_second_model }}

      - name: Setup RamaLama
        if: inputs.inference_provider == 'ramalama'
        uses: ./.github/actions/setup-ramalama
        with:
          model: ${{ inputs.inference_model }}

      - name: Run Smoke E2E tests in ${{ inputs.mode == 'prod' && 'Production' || 'Development' }} Mode
        shell: bash
        env:
          VITE_CI: 'true'
          E2E_TEST_SCRIPT: ${{ inputs.test_script }}
          E2E_INSTANCE: ${{ inputs.instance }}
          E2E_MODE: ${{ inputs.mode }}
          E2E_COMPILE_ARGS: ${{ inputs.compile_args }}
        run: |
          # Derive binary path from instance (OS and architecture)
          if [[ "$E2E_INSTANCE" == *"windows"* ]]; then
            if [[ "$E2E_INSTANCE" == *"arm"* ]]; then
              BINARY_PATH="./dist/win-arm64-unpacked/Kaiden.exe"
            else
              BINARY_PATH="./dist/win-unpacked/Kaiden.exe"
            fi
          elif [[ "$E2E_INSTANCE" == *"ubuntu"* ]] || [[ "$E2E_INSTANCE" == *"linux"* ]]; then
            BINARY_PATH="./dist/linux-unpacked/kaiden"
          elif [[ "$E2E_INSTANCE" == *"macos"* ]]; then
            BINARY_PATH="./dist/mac-arm64/Kaiden.app/Contents/MacOS/Kaiden"
          else
            echo "::error::Unknown instance: $E2E_INSTANCE. Cannot determine binary path."
            exit 1
          fi

          if [ "$E2E_MODE" == "prod" ]; then
            echo "Compiling Kaiden in production mode"
            export ELECTRON_ENABLE_INSPECT=true
            pnpm compile:current $E2E_COMPILE_ARGS

            path=$(realpath "$BINARY_PATH")
            echo "Kaiden built binary: $path"
            export KAIDEN_BINARY="$path"
          fi

          # On Linux, kdn CLI stores secrets via D-Bus Secret Service.
          # dbus-run-session provides an ephemeral bus; gnome-keyring-daemon
          # creates a "login" keyring unlocked with an empty password, which
          # becomes the default collection that kdn can write secrets to.
          # PATH is re-exported so child processes (Electron -> spawn kdn)
          # can resolve binaries installed in /usr/local/bin.
          if [ "$RUNNER_OS" == "Linux" ]; then
            dbus-run-session -- bash -c '
              export PATH="/usr/local/bin:$PATH"
              echo "" | gnome-keyring-daemon --start --components=secrets --unlock --daemonize
              dbus-send --session --print-reply --dest=org.freedesktop.secrets \
                /org/freedesktop/secrets \
                org.freedesktop.Secret.Service.SetAlias \
                string:"default" \
                objpath:"/org/freedesktop/secrets/collection/login"
              pnpm $E2E_TEST_SCRIPT
            '
          else
            pnpm $E2E_TEST_SCRIPT
          fi

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@5e05ac00ad0604dfb7e313ae412aa3284f4906d6 # v6
        if: always()
        with:
          annotate_only: true
          fail_on_failure: true
          include_passed: true
          detailed_summary: true
          require_tests: true
          report_paths: '**/*results.xml'

      - name: Upload test artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: results-e2e-${{ inputs.instance }}-${{ inputs.mode }}${{ inputs.inference_provider != 'none' && format('-{0}', inputs.inference_provider) || '' }}
          path: tests/playwright/output/**
          retention-days: 7
