name: Workspace E2E Tests (Windows Azure)
run-name: Workspace E2E Tests (Windows Azure)

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      repo_branch:
        default: 'FORK=openkaiden,BRANCH=main'
        description: 'Kaiden fork and branch (FORK=owner,BRANCH=branch)'
        type: string
        required: true
      npm_target:
        default: 'test:e2e:workspaces'
        description: 'npm target to run tests'
        type: choice
        options:
          - 'test:e2e:workspaces'
          - 'test:e2e:workspaces:prod'
          - 'test:e2e:workspaces:claude'
          - 'test:e2e:workspaces:opencode'
          - 'test:e2e:workspaces:goose'
          - 'test:e2e:workspaces:openclaw'
        required: true
      env_vars:
        default: 'PODMAN_ENABLED=true,WORKSPACE_TESTS_CI=true'
        description: 'Env. Variables passed into target machine, ie: VAR1=xxx,VAR2=true'
        type: string
        required: true
      podman_version:
        default: 'latest'
        description: 'Podman version ("latest" for stable release, or specific like "v5.6.1")'
        type: string
        required: true
      inference_model:
        default: 'granite3.2:2b'
        description: 'Model to pull for Ollama/RamaLama'
        type: string
        required: false
      images_version:
        default: 'v0.1.1'
        description: 'pde2e-image version tag'
        type: string
        required: true
      mapt_params:
        description: |
          **Create instance (leave empty to use defaults)**

          **Format:** IMAGE=xxx;VERSION_TAG=xxx;CPUS=xxx;MEMORY=xxx;EXCLUDED_REGIONS=xxx
        required: false
        type: string

jobs:
  workspace-e2e:
    timeout-minutes: 150
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      checks: write
    env:
      WINDOWS_VERSION: '11'
      WINDOWS_FEATUREPACK: '25h2-ent'
    strategy:
      fail-fast: false
      matrix:
        podman-provider: ['hyperv']

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: Fetch latest stable Podman version
      id: fetch-podman
      uses: redhat-actions/podman-install/.github/actions/fetch-latest-podman-version-windows@aea6ff44f2a4a82da13d22061ce73443a125925d
      with:
        version_input: ${{ github.event.inputs.podman_version || 'latest' }}
        file_type: 'msi'
        github_token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set default environment variables
      env:
        DEFAULT_REPO_BRANCH: 'FORK=openkaiden,BRANCH=main'
        DEFAULT_NPM_TARGET: 'test:e2e:workspaces'
        DEFAULT_ENV_VARS: 'PODMAN_ENABLED=true,WORKSPACE_TESTS_CI=true'
        DEFAULT_IMAGE_VERSION: 'v0.1.1'
      run: |
        echo "${{ github.event.inputs.repo_branch || env.DEFAULT_REPO_BRANCH }}" | awk -F ',' \
         '{for (i=1; i<=NF; i++) {split($i, kv, "="); print kv[1]"="kv[2]}}' >> $GITHUB_ENV
        echo "PODMAN_PROVIDER=${{ matrix.podman-provider }}" >> $GITHUB_ENV
        echo "NPM_TARGET=${{ github.event.inputs.npm_target || env.DEFAULT_NPM_TARGET }}" >> $GITHUB_ENV
        echo "ENV_VARS=${{ github.event.inputs.env_vars || env.DEFAULT_ENV_VARS }}" >> $GITHUB_ENV
        echo "PODMAN_URL=${{ steps.fetch-podman.outputs.download_url }}" >> $GITHUB_ENV
        echo "INFERENCE_MODEL=${{ github.event.inputs.inference_model || 'granite3.2:2b' }}" >> $GITHUB_ENV
        echo "PDE2E_RUNNER=${{ github.event.inputs.images_version || env.DEFAULT_IMAGE_VERSION }}" >> $GITHUB_ENV

        # For mapt_params, use repo variables directly if input is empty
        if [ -n "${{ github.event.inputs.mapt_params }}" ]; then
          mapt_params="${{ github.event.inputs.mapt_params }}"
        else
          mapt_params="IMAGE=${{ vars.MAPT_IMAGE }};VERSION_TAG=${{ vars.MAPT_VERSION_TAG }};CPUS=${{ vars.MAPT_CPUS }};MEMORY=${{ vars.MAPT_MEMORY }};EXCLUDED_REGIONS=\"${{ vars.MAPT_EXCLUDED_REGIONS }}\""
        fi
        echo "$mapt_params" | awk -F ';' '{for (i=1; i<=NF; i++) {split($i, kv, "="); print "MAPT_"kv[1]"="kv[2]}}' >> "$GITHUB_ENV"

    - name: Create instance
      uses: podman-desktop/e2e/.github/actions/create-instance@77d4a1ea4f361dddd1fa231ccf74392dcac5c447
      with:
        mapt-image: ${{ env.MAPT_IMAGE || '' }}
        mapt-version: ${{ env.MAPT_VERSION_TAG || '' }}
        windows-version: ${{ env.WINDOWS_VERSION }}
        windows-featurepack: ${{ env.WINDOWS_FEATUREPACK }}
        cpus: ${{ env.MAPT_CPUS || '' }}
        memory: ${{ env.MAPT_MEMORY || '' }}
        excluded-regions: ${{ env.MAPT_EXCLUDED_REGIONS || '' }}
        tags: 'project=kaiden,orgrepo=${{ github.repository }},run=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }},source=github'
        arm-tenant-id: ${{ secrets.ARM_TENANT_ID }}
        arm-subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
        arm-client-id: ${{ secrets.ARM_CLIENT_ID }}
        arm-client-secret: ${{ secrets.ARM_CLIENT_SECRET }}

    - name: Check instance system info
      uses: podman-desktop/e2e/.github/actions/instance-system-info@77d4a1ea4f361dddd1fa231ccf74392dcac5c447

    - name: Emulate X session
      uses: podman-desktop/e2e/.github/actions/emulate-x-session@77d4a1ea4f361dddd1fa231ccf74392dcac5c447

    - name: Read connection details
      id: conn
      shell: bash
      run: |
        echo "host=$(cat host)" >> "$GITHUB_OUTPUT"
        echo "username=$(cat username)" >> "$GITHUB_OUTPUT"


    - name: Configure Podman machine defaults on remote host
      shell: bash
      run: |
        SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=1200 -i id_rsa"
        HOST="${{ steps.conn.outputs.username }}@${{ steps.conn.outputs.host }}"
        SCRIPT='
          $configDir = "$env:APPDATA\containers"
          if (-not (Test-Path $configDir)) { New-Item -ItemType Directory -Path $configDir -Force | Out-Null }
          $conf = "[machine]`ncpus = 4`nmemory = 16384`n"
          Set-Content -Path "$configDir\containers.conf" -Value $conf
          Write-Host "Podman machine defaults: 4 CPUs, 16GB RAM"
        '
        encoded=$(printf '%s' "$SCRIPT" | iconv -t UTF-16LE | base64 -w 0)
        ssh $SSH_OPTS "$HOST" "powershell -NoProfile -EncodedCommand $encoded"

    - name: Setup Python on remote host
      timeout-minutes: 10
      continue-on-error: true
      uses: ./.github/actions/setup-python-remote
      with:
        host: ${{ steps.conn.outputs.host }}
        username: ${{ steps.conn.outputs.username }}
        ssh-key-path: 'id_rsa'

    # TODO: Re-enable once workspace tests are passing
    # - name: Setup Ollama on remote host
    #   timeout-minutes: 25
    #   continue-on-error: true
    #   uses: ./.github/actions/setup-ollama-remote
    #   with:
    #     host: ${{ steps.conn.outputs.host }}
    #     username: ${{ steps.conn.outputs.username }}
    #     ssh-key-path: 'id_rsa'
    #     model: ${{ env.INFERENCE_MODEL }}

    # - name: Setup RamaLama on remote host
    #   timeout-minutes: 15
    #   continue-on-error: true
    #   uses: ./.github/actions/setup-ramalama-remote
    #   with:
    #     host: ${{ steps.conn.outputs.host }}
    #     username: ${{ steps.conn.outputs.username }}
    #     ssh-key-path: 'id_rsa'
    #     model: ${{ env.INFERENCE_MODEL }}

    - name: Build env vars for test runner
      id: test-env
      shell: bash
      run: |
        declare -a parts=("${{ env.ENV_VARS }}")
        [ "${{ env.OLLAMA_ENABLED }}" == "true" ] && parts+=("OLLAMA_ENABLED=true")
        [ "${{ env.RAMALAMA_ENABLED }}" == "true" ] && parts+=("RAMALAMA_ENABLED=true")
        echo "vars=$(IFS=,; echo "${parts[*]}")" >> "$GITHUB_OUTPUT"

    - name: Run Kaiden Workspace Playwright E2E tests
      shell: bash
      run: |
        echo "PODMANDESKTOP_CI_BOT_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> secrets.txt
        echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> secrets.txt
        echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> secrets.txt
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> secrets.txt
        echo "MISTRAL_API_KEY=${{ secrets.MISTRAL_API_KEY }}" >> secrets.txt

        podman run -d --name pde2e-runner-run \
          -e TARGET_HOST=$(cat host) \
          -e TARGET_HOST_USERNAME=$(cat username) \
          -e TARGET_HOST_KEY_PATH=/data/id_rsa \
          -e TARGET_FOLDER=pd-e2e \
          -e TARGET_RESULTS=results \
          -e OUTPUT_FOLDER=/data \
          -e DEBUG=true \
          -v $PWD:/data:z \
          -v $PWD/secrets.txt:/opt/pde2e-image/secrets.txt:z \
          quay.io/odockal/pde2e-image:${{ env.PDE2E_RUNNER }}-windows \
          pd-e2e/runner.ps1 \
            -targetFolder pd-e2e \
            -resultsFolder results \
            -fork ${{ env.FORK }} \
            -branch ${{ env.BRANCH }} \
            -repo kaiden \
            -appName "Kaiden" \
            -podmanDownloadUrl "${{ env.PODMAN_URL }}" \
            -initialize 1 \
            -start 1 \
            -rootful 1 \
            -podmanProvider ${{ env.PODMAN_PROVIDER }} \
            -npmTarget ${{ env.NPM_TARGET }} \
            -envVars "${{ steps.test-env.outputs.vars }}" \
            -secretFile secrets.txt

        podman logs -f pde2e-runner-run

        EXIT_CODE=$(podman inspect --format='{{.State.ExitCode}}' pde2e-runner-run)
        if [ "$EXIT_CODE" -ne 0 ]; then
          echo "::error::Test runner container exited with code $EXIT_CODE"
          exit 1
        fi

    - name: Create workflow run attributes
      if: always()
      uses: jsdaniell/create-json@b8e77fa01397ca39cc4a6198cc29a3be5481afef
      with:
        name: 'workflow-run-attributes.json'
        json: |
          {
            "podman-provider": "${{ env.PODMAN_PROVIDER }}",
            "podman-version": "${{ steps.fetch-podman.outputs.version }}",
            "os": "windows",
            "os-version": "${{ env.WINDOWS_VERSION }}",
            "featurepack": "${{ env.WINDOWS_FEATUREPACK }}",
            "inference-model": "${{ env.INFERENCE_MODEL }}",
            "ollama-enabled": "${{ env.OLLAMA_ENABLED }}",
            "ramalama-enabled": "${{ env.RAMALAMA_ENABLED }}",
            "architecture": "x86_64",
            "platform": "windows-nt",
            "repository": "kaiden"
          }

    - name: Destroy instance
      if: always()
      uses: podman-desktop/e2e/.github/actions/destroy-instance@77d4a1ea4f361dddd1fa231ccf74392dcac5c447
      with:
        mapt-image: ${{ env.MAPT_IMAGE || '' }}
        mapt-version: ${{ env.MAPT_VERSION_TAG || '' }}
        arm-tenant-id: ${{ secrets.ARM_TENANT_ID }}
        arm-subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
        arm-client-id: ${{ secrets.ARM_CLIENT_ID }}
        arm-client-secret: ${{ secrets.ARM_CLIENT_SECRET }}

    - name: Generate infrastructure failure report
      if: failure()
      uses: podman-desktop/e2e/.github/actions/generate-infra-report@77d4a1ea4f361dddd1fa231ccf74392dcac5c447

    - name: Publish Test Report
      uses: mikepenz/action-junit-report@3a81627bfac62268172037048872e8ebd4207e6d # v6
      if: always()
      with:
        fail_on_failure: true
        include_passed: true
        detailed_summary: true
        require_tests: true
        report_paths: '**/*results.xml'

    - name: Upload test artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always()
      with:
        name: workspace-e2e-win${{ env.WINDOWS_VERSION }}-${{ matrix.podman-provider }}
        path: |
          results/*
          !results/tmp_script_*
          !results/scripts/
          **/workflow-run-attributes.json
          **/junit-infra-failure-report.xml
